<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title> Student Info </title>
        <link rel="stylesheet" href="../Design/design.css">
    </head>
    <body>
        <div class="container">
            <h1>  </h1>
            <form>
                <fieldset>
                    <legend> Student Information </legend>

                    <table>
                        <tr>
                            <td>
                                <label for= "fullname"> Full Name (Text) </label>
                                <input type= "text" id= "fullname" name= "fullname" placeholder= "Enter your full name">
                            </td>

                            <td class="gap"></td>

                            <td>
                                <label for= "email"> Email Address </label>
                                <input type= "email" id= "email" name= "email" placeholder= "your.email@example.com">
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <label for="password"> Password </label>
                                <input type= "password" id= "password" name= "password" placeholder= "Enter secure password">
                            </td>

                            <td class="gap"></td>

                            <td>
                                <label for= "age"> Age (Number) </label>
                                <input type= "number" id= "age" name= "age" placeholder="Enter your age">
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <label for= "date"> Experiment Date </label>
                                <input type= "date" id= "date" name= "date">
                            </td>

                            <td class="gap"></td>

                            <td>
                                <label for= "phone"> Phone Number (Tel) </label>
                                <input type= "tel" id= "phone" name= "phone" placeholder= "+880 XXXX XXXXXX">
                            </td>
                        </tr>
                    </table>
                </fieldset>

                <div class="button-area">
                    <input type= "submit" id= "submit" name= "submit" value= "SUBMIT">
                    <input type= "reset" id= "reset" name= "reset" value= "CLEAR">
                </div>
            </form>
        </div>
    </body>
</html>
